<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Landing Page</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f7f7f7;
        }

        /* NAVBAR */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: #1e1e2f;
            color: white;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 15px;
        }

        /* HERO SECTION */
        .hero {
            background: linear-gradient(135deg, #4CAF50, #2e8b57);
            color: white;
            text-align: center;
            padding: 80px 20px;
        }

        .hero h1 {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .hero p {
            font-size: 18px;
            margin-bottom: 20px;
        }

        .hero button {
            padding: 12px 20px;
            border: none;
            background: white;
            color: #2e8b57;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
        }

        /* SECTIONS */
        .section {
            padding: 40px 20px;
            text-align: center;
        }

        .cards {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .card {
            background: white;
            padding: 20px;
            width: 250px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        footer {
            background: #1e1e2f;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav>
    <div><b>MyLanding</b></div>
    <div>
        <a href="#">Home</a>
        <a href="#">Features</a>
        <a href="#">Contact</a>
    </div>
</nav>

<!-- HERO -->
<div class="hero">
    <h1>Build Something Amazing</h1>
    <p>A simple landing page using HTML & CSS</p>
    <button onclick="alert('Welcome!')">Get Started</button>
</div>

<!-- FEATURES -->
<div class="section">
    <h2>Features</h2>
    <div class="cards">
        <div class="card">
            <h3>Fast</h3>
            <p>Lightweight and quick loading design.</p>
        </div>
        <div class="card">
            <h3>Simple</h3>
            <p>Clean UI with minimal structure.</p>
        </div>
        <div class="card">
            <h3>Responsive</h3>
            <p>Works on mobile and desktop devices.</p>
        </div>
    </div>
</div>

<!-- FOOTER -->
<footer>
    © 2026 My Landing Page | Built with HTML & CSS
</footer>

</body>
</html>
